{% extends "base.html" %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}?v={{ static_v }}">
{% endblock %}
{% block content %}
<div class="login-page" style="background-image: url('{{ url_for('static', filename='img/login-bg.svg') }}');">
    <div class="login-bg-overlay"></div>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo-wrap" data-brand="{{ brand }}">
                {% if logo_url %}
                <img src="{{ logo_url }}?v={{ static_v }}" alt="{{ brand }}" class="login-logo login-logo-animated">
                {% else %}
                <div class="login-logo-mark" aria-hidden="true">
                    <svg viewBox="0 0 120 120" class="login-mark-svg">
                        <circle cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="3" opacity="0.25"/>
                        <text x="60" y="68" text-anchor="middle" font-size="28" font-weight="700" fill="currentColor">LP</text>
                    </svg>
                </div>
                {% endif %}
            </div>
            <h1>{{ brand }}</h1>
            <p class="login-tagline">{{ t('tagline') }}</p>
        </div>
        <form method="POST" class="login-form elegant-form">
            <div class="form-group">
                <label for="username">{{ t('username') }}</label>
                <input id="username" type="text" name="username" class="field-control" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">{{ t('password') }}</label>
                <input id="password" type="password" name="password" class="field-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">{{ t('login') }}</button>
        </form>
        <div class="lang-switch">
            <a href="{{ url_for('auth.set_language', lang='ar') }}">{{ t('arabic') }}</a>
            <span>|</span>
            <a href="{{ url_for('auth.set_language', lang='en') }}">{{ t('english') }}</a>
        </div>
    </div>
</div>
{% endblock %}
